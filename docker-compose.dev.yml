services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: logforge
      POSTGRES_PASSWORD: logforge
      POSTGRES_DB: logforge
    ports:
      - "5432:5432"
    volumes:
      - logforge_pg:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  logforge_pg:
